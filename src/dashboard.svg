<svg width="1200" height="340" viewBox="0 0 1200 340" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Developer dashboard — whaiman</title>
  <desc>Research status, current activity</desc>

  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#060a10"/>
      <stop offset="100%" stop-color="#0c1220"/>
    </linearGradient>
    <linearGradient id="divblue" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0"/>
      <stop offset="50%" stop-color="#3b82f6" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </linearGradient>

    <style>
      .f{font-family:'JetBrains Mono','Fira Code','Courier New',monospace}
      @keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
      @keyframes pulse{0%,100%{opacity:.5;r:3}50%{opacity:1;r:4}}
      @keyframes orb{0%,100%{opacity:.12}50%{opacity:.22}}
      @keyframes blink{0%,49%{opacity:1}50%,100%{opacity:0}}
      @keyframes scan{0%{transform:translateX(-140px);opacity:0}15%{opacity:.12}85%{opacity:.04}100%{transform:translateX(1340px);opacity:0}}

      .fu{animation:fadeUp .7s .2s ease both}
      .fu2{animation:fadeUp .7s .35s ease both}
      .fu3{animation:fadeUp .7s .5s ease both}
      .dot{animation:pulse 2.4s ease-in-out infinite}
      .orb{animation:orb 4s ease-in-out infinite}
      .sc{animation:scan 8s linear infinite}
      .blink{animation:blink 1.1s step-end infinite}
    </style>
  </defs>

  <rect width="1200" height="340" fill="url(#bg)"/>

  <circle cx="1000" cy="170" r="200" fill="#7c3aed" opacity=".04" class="orb"/>
  <circle cx="600" cy="340" r="160" fill="#0e7490" opacity=".03" class="orb"/>
  <circle cx="200" cy="100" r="180" fill="#1d4ed8" opacity=".03" class="orb"/>

  <g opacity=".04" stroke="#7dd3fc" stroke-width=".4" fill="none">
    <line x1="0" y1="85" x2="1200" y2="85"/>
    <line x1="0" y1="170" x2="1200" y2="170"/>
    <line x1="0" y1="255" x2="1200" y2="255"/>
    <line x1="150" y1="0" x2="150" y2="340"/>
    <line x1="300" y1="0" x2="300" y2="340"/>
    <line x1="450" y1="0" x2="450" y2="340"/>
    <line x1="600" y1="0" x2="600" y2="340"/>
    <line x1="750" y1="0" x2="750" y2="340"/>
    <line x1="900" y1="0" x2="900" y2="340"/>
    <line x1="1050" y1="0" x2="1050" y2="340"/>
  </g>

  <rect x="0" y="0" width="90" height="340" fill="#3b82f6" opacity=".03" class="sc"/>
  <rect x="1" y="1" width="1198" height="338" rx="6" fill="none" stroke="#1e3a52" stroke-width=".5"/>

  <rect x="600" y="30" width="1" height="280" fill="url(#divblue)"/>

  <!-- COL 1 -->
  <text x="40" y="43" class="f" font-size="14" fill="#7dd3fc" letter-spacing=".15em" opacity=".9">RESEARCH</text>
  <line x1="40" y1="52" x2="560" y2="52" stroke="#1e3a52" stroke-width=".5"/>

  <g class="fu">
    <rect x="40" y="64" width="520" height="74" rx="5" fill="#060d18" stroke="#1e3a5c" stroke-width=".5"/>
    <circle cx="62" cy="84" r="3" fill="#4ade80" class="dot"/>
    <text x="76" y="88" class="f" font-size="14" fill="#94a3b8">Orbital &amp; free-space mechanics</text>
    <text x="76" y="105" class="f" font-size="12" fill="#475569">computing object motion in open space</text>
    <text x="44" y="128" class="f" font-size="13" fill="#16a34a">in progress</text>
  </g>

  <g class="fu2">
    <rect x="40" y="154" width="520" height="74" rx="5" fill="#060d18" stroke="#2d1f5e" stroke-width=".5"/>
    <circle cx="62" cy="174" r="3" fill="#c4b5fd" class="dot"/>
    <text x="76" y="178" class="f" font-size="14" fill="#94a3b8">Adaptive optical modulation (AI)</text>
    <text x="76" y="195" class="f" font-size="12" fill="#475569">AI-driven modulation for telecom</text>
    <text x="44" y="218" class="f" font-size="13" fill="#7c3aed">in progress</text>
  </g>

  <g class="fu3">
    <rect x="40" y="244" width="520" height="46" rx="5" fill="#060d18" stroke="#1e293b" stroke-width=".5"/>
    <text x="56" y="263" class="f" font-size="12" fill="#334155">code.status</text>
    <text x="56" y="280" class="f" font-size="13" fill="#60a5fa">will be published alongside each paper</text>
  </g>

  <!-- COL 2 -->
  <text x="640" y="43" class="f" font-size="14" fill="#c4b5fd" letter-spacing=".15em" opacity=".9">CURRENT ACTIVITY</text>
  <line x1="640" y1="52" x2="1160" y2="52" stroke="#1e293b" stroke-width=".5"/>

  <g class="fu">
    <rect x="640" y="64" width="520" height="58" rx="5" fill="#060d18" stroke="#1e3a5c" stroke-width=".5"/>
    <text x="660" y="84" class="f" font-size="13" fill="#334155">mode</text>
    <text x="660" y="104" class="f" font-size="15" fill="#60a5fa">building · researching</text>
  </g>

  <g class="fu2">
    <rect x="640" y="134" width="520" height="58" rx="5" fill="#060d18" stroke="#2d1f5e" stroke-width=".5"/>
    <text x="660" y="154" class="f" font-size="13" fill="#334155">interests beyond backend</text>
    <text x="660" y="174" class="f" font-size="13" fill="#a78bfa">systems · physics · medicine</text>
  </g>

  <g class="fu3">
    <rect x="640" y="204" width="520" height="58" rx="5" fill="#060d18" stroke="#14532d" stroke-width=".5"/>
    <text x="660" y="224" class="f" font-size="13" fill="#334155">availability</text>
    <text x="660" y="244" class="f" font-size="13" fill="#4ade80">open to projects &amp; work</text>
  </g>

  <text x="640" y="294" class="f" font-size="12" fill="#3b82f6" opacity=".85">
    whaiman · github.com/whaiman<tspan class="blink" fill="#60a5fa">_</tspan>
  </text>

</svg>